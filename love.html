<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Our Story ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{

background:linear-gradient(180deg,#ff8fc4,#ff5f95,#ff2f7d);
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

}

/* Floating Hearts */

.heart{

position:absolute;
color:white;
font-size:20px;
animation:float linear infinite;
opacity:.5;

}

@keyframes float{

0%{
transform:translateY(100vh) rotate(0deg);
opacity:0;
}

30%{
opacity:.6;
}

100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}

}

.card{

width:92%;
max-width:380px;
background:rgba(255,255,255,.18);
backdrop-filter:blur(14px);
border-radius:25px;
padding:30px;
text-align:center;
box-shadow:0 10px 35px rgba(0,0,0,.25);

animation:fadeIn 2s;

}

@keyframes fadeIn{

from{
opacity:0;
transform:scale(.8);
}

to{
opacity:1;
transform:scale(1);
}

}

h1{

color:white;
font-size:34px;
margin-bottom:10px;

}

h2{

color:#fff;
font-weight:400;
margin-bottom:25px;

}

#typing{

color:white;
font-size:18px;
line-height:32px;
min-height:180px;

}

.days{

margin-top:25px;
font-size:22px;
color:white;
font-weight:bold;

}

button{

margin-top:35px;
padding:15px 40px;
font-size:18px;
border:none;
border-radius:50px;
background:white;
color:#ff2f7d;
cursor:pointer;
font-weight:bold;
transition:.4s;

}

button:hover{

transform:scale(1.08);

}

</style>

</head>

<body>

<div class="card">

<h1>Hi Loveth ❤️</h1>

<h2>From Chimaobi</h2>

<div id="typing"></div>

<div class="days" id="days"></div>

<button onclick="location='memories.html'">
Next ❤️
</button>

</div>

<script>

/* Floating hearts */

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"%";

heart.style.animationDuration=(5+Math.random()*6)+"s";

heart.style.fontSize=(15+Math.random()*20)+"px";

document.body.appendChild(heart);

}

/* Typewriter */

const text=

`Before you press that button...

I just want you to know something.

Out of all the people in this world...

My heart chose you.

Since June 3rd, 2026...

Every day has become a little brighter because you're in my life.

This little website isn't perfect...

But every line here was made with love.

❤️`;

let i=0;

function type(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i);

i++;

setTimeout(type,35);

}

}

type();

/* Days Together */

const start=new Date("2026-06-03");

const now=new Date();

const diff=Math.floor((now-start)/(1000*60*60*24));

document.getElementById("days").innerHTML=
"❤️ Together for "+diff+" beautiful days ❤️";

</script>

</body>
</html>
