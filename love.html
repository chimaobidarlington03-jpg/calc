<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Loveth ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
overflow:hidden;
height:100vh;
background:linear-gradient(#030315,#0c1037,#1f1147);
display:flex;
justify-content:center;
align-items:center;
color:white;
position:relative;
}

/* Stars */

.stars{
position:absolute;
width:100%;
height:100%;
background:url("https://i.ibb.co/Y4c2FQH/stars.png");
animation:moveStars 120s linear infinite;
opacity:.5;
}

@keyframes moveStars{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

/* Floating Hearts */

.heart{
position:absolute;
color:#ff4fa3;
font-size:20px;
animation:float 12s linear infinite;
opacity:.7;
}

@keyframes float{
0%{
transform:translateY(100vh) scale(.5);
opacity:0;
}
30%{
opacity:1;
}
100%{
transform:translateY(-120vh) scale(1.4);
opacity:0;
}
}

/* Card */

.card{
position:relative;
width:90%;
max-width:700px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
padding:40px;
border-radius:30px;
text-align:center;
box-shadow:0 0 30px rgba(255,105,180,.25);
animation:fade 2s;
z-index:2;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
font-family:"Great Vibes",cursive;
font-size:65px;
color:#ff8ec8;
margin-bottom:15px;
}

#line{
font-size:22px;
min-height:70px;
margin:20px 0;
line-height:1.8;
}

button{
padding:18px 45px;
font-size:18px;
border:none;
border-radius:50px;
cursor:pointer;
background:#ff4fa3;
color:white;
transition:.4s;
box-shadow:0 0 20px hotpink;
}

button:hover{
transform:scale(1.08);
background:#ff2e8d;
}

.small{
margin-top:20px;
font-size:15px;
opacity:.75;
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="card">

<h1>Loveth ❤️</h1>

<div id="line"></div>

<button onclick="nextPage()">
Continue ❤️
</button>

<div class="small">
Made with love by Chimaobi
</div>

</div>

<script>

const text=[
"Hi Loveth... ❤️",
"",
"I built this little world just for you.",
"",
"It isn't perfect...",
"",
"But every line of it was made while thinking about you.",
"",
"So before we continue...",
"",
"Smile for me. 😊",
"",
"Welcome to our little love story..."
];

let i=0;

function type(){

if(i<text.length){

document.getElementById("line").innerHTML=text[i];

i++;

setTimeout(type,1800);

}

}

type();

function nextPage(){

document.body.style.opacity="0";

setTimeout(()=>{

location.href="ourstory.html";

},1200);

}

// Floating hearts

for(let i=0;i<40;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(6+Math.random()*8)+"s";

h.style.fontSize=(15+Math.random()*25)+"px";

h.style.animationDelay=Math.random()*8+"s";

document.body.appendChild(h);

}

</script>

</body>
</html>
