<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Loveth ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9ecf,#ff4f9a);
overflow:hidden;

}

.circle{

position:absolute;
border-radius:50%;
background:white;
opacity:.2;
animation:float 12s linear infinite;

}

@keyframes float{

0%{
transform:translateY(100vh) scale(0);
}

100%{
transform:translateY(-100vh) scale(2);
}

}

.card{

width:320px;
padding:35px;
text-align:center;
background:rgba(255,255,255,.18);
backdrop-filter:blur(12px);
border-radius:25px;
box-shadow:0 0 30px rgba(0,0,0,.2);

}

h1{

color:white;
font-size:30px;
margin-bottom:15px;

}

p{

color:white;
font-size:17px;
line-height:28px;

}

.loader{

width:90%;
height:10px;
background:white;
border-radius:20px;
margin:auto;
margin-top:25px;
overflow:hidden;

}

.bar{

height:100%;
width:0%;
background:#ff0066;
animation:load 4s forwards;

}

@keyframes load{

100%{

width:100%;

}

}

</style>

</head>

<body>

<div class="circle" style="left:15%;width:70px;height:70px;animation-duration:9s;"></div>

<div class="circle" style="left:40%;width:120px;height:120px;animation-duration:14s;"></div>

<div class="circle" style="left:70%;width:80px;height:80px;animation-duration:11s;"></div>

<div class="circle" style="left:85%;width:50px;height:50px;animation-duration:8s;"></div>

<div class="card">

<h1>Hi Loveth ❤️</h1>

<p>

I spent hours creating something...

just for you.

</p>

<div class="loader">

<div class="bar"></div>

</div>

</div>

<script>

setTimeout(()=>{

location="love.html"

},4000)

</script>

</body>
</html>
